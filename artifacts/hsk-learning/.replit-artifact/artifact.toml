kind = "web"
previewPath = "/"
title = "HSK Smart Learning"
version = "1.0.0"
id = "artifacts/hsk-learning"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23962

[services.development]
run = "pnpm --filter @workspace/hsk-learning run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hsk-learning", "run", "build" ]
publicDir = "artifacts/hsk-learning/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23962"
BASE_PATH = "/"
